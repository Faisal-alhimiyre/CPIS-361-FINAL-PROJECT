<!DOCTYPE html>
<!-- Full-page AR only: matches AR.js README (no iframe, no SPA). Form lives in index.html. -->
<html lang="ar" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>معاينة AR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Tajawal:wght@700&family=Amiri:wght@700&family=Changa:wght@600&family=El+Messiri:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #ar-back {
        position: fixed;
        top: 10px;
        inset-inline-start: 10px;
        z-index: 10002;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.25);
      }
      #ar-back:hover {
        background: rgba(255, 255, 255, 0.12);
      }
    </style>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.8/aframe/build/aframe-ar.min.js"></script>
  </head>
  <body>
    <a id="ar-back" href="index.html">← العودة للنموذج</a>
    <!-- Non-embedded + videoTexture: same pattern as AR.js marker demos; avoids black canvas in tiny iframes. -->
    <a-scene
      vr-mode-ui="enabled: false"
      arjs="trackingMethod: best; sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    >
      <a-marker preset="hiro" emitevents="true">
        <a-plane
          id="message-plane"
          width="1.2"
          height="0.35"
          position="0 0.1 0"
          material="shader: flat; transparent: true; side: double"
        ></a-plane>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
    <script>
      (function () {
        var MESSAGE = "احبك اكثر";
        var params = new URLSearchParams(location.search);
        var state = {
          c: (params.get("c") || "1a5f4a").replace(/^#/, ""),
          font: params.get("font") || "Cairo",
          gen: params.get("gen") || "sans-serif",
        };

        function hexColor() {
          return state.c.charAt(0) === "#" ? state.c : "#" + state.c;
        }

        function fontStack() {
          return '"' + state.font + '", ' + state.gen;
        }

        function buildTex() {
          var w = 2048;
          var h = 512;
          var c = document.createElement("canvas");
          c.width = w;
          c.height = h;
          var ctx = c.getContext("2d");
          ctx.fillStyle = "rgba(0,0,0,0.45)";
          ctx.fillRect(0, 0, w, h);
          ctx.direction = "rtl";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillStyle = hexColor();
          ctx.font = "bold 140px " + fontStack();
          ctx.shadowColor = "rgba(0,0,0,0.55)";
          ctx.shadowBlur = 18;
          ctx.fillText(MESSAGE, w / 2, h / 2 + 8);
          return c.toDataURL("image/png");
        }

        function apply() {
          var plane = document.getElementById("message-plane");
          if (!plane) return;
          plane.setAttribute("material", {
            src: buildTex(),
            transparent: true,
            shader: "flat",
            side: "double",
          });
        }

        function initTextures() {
          var run = function () {
            apply();
            requestAnimationFrame(apply);
            setTimeout(apply, 100);
            setTimeout(apply, 400);
          };
          if (document.fonts && document.fonts.ready) {
            document.fonts.ready
              .then(function () {
                return document.fonts.load("700 48px " + fontStack());
              })
              .catch(function () {})
              .then(run);
          } else {
            run();
          }
        }

        document.querySelector("a-scene").addEventListener("loaded", initTextures);
      })();
    </script>
  </body>
</html>
